<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4780A"/>
      <stop offset="100%" stop-color="#8B3A00"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Speed lines -->
  <line x1="0" y1="150" x2="220" y2="150" stroke="#FFE08A" stroke-width="3" opacity="0.3"/>
  <line x1="0" y1="180" x2="200" y2="180" stroke="#FFE08A" stroke-width="2" opacity="0.2"/>
  <line x1="0" y1="210" x2="210" y2="210" stroke="#FFE08A" stroke-width="3" opacity="0.3"/>
  <line x1="0" y1="240" x2="190" y2="240" stroke="#FFE08A" stroke-width="2" opacity="0.2"/>
  <line x1="0" y1="270" x2="215" y2="270" stroke="#FFE08A" stroke-width="3" opacity="0.3"/>
  <!-- Lightning bolt -->
  <polygon points="340,40 270,220 320,220 260,380 400,170 340,170 400,40" fill="#FFE08A" opacity="0.95"/>
  <!-- Glow -->
  <polygon points="340,40 270,220 320,220 260,380 400,170 340,170 400,40" fill="white" opacity="0.2"/>
  <!-- Labels -->
  <rect x="30" y="60" width="160" height="50" rx="12" fill="white" opacity="0.15"/>
  <text x="110" y="82" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">You learn math:</text>
  <text x="110" y="100" font-family="Arial Black, sans-serif" font-size="15" fill="#FFE08A" text-anchor="middle">MONTHS</text>
  <rect x="30" y="130" width="160" height="50" rx="12" fill="white" opacity="0.15"/>
  <text x="110" y="152" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">PAI learns math:</text>
  <text x="110" y="170" font-family="Arial Black, sans-serif" font-size="15" fill="#FFE08A" text-anchor="middle">MINUTES ⚡</text>
  <!-- AI label -->
  <text x="460" y="230" font-family="Arial Black, sans-serif" font-size="52" fill="white" text-anchor="middle" opacity="0.9">AI</text>
  <text x="460" y="270" font-family="Arial, sans-serif" font-size="16" fill="#FFE08A" text-anchor="middle">is here!</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#3D1A00"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="50" r="3" fill="#FFE08A" opacity="0.6"/>
  <circle cx="150" cy="30" r="2" fill="#FFE08A" opacity="0.5"/>
  <circle cx="450" cy="40" r="3" fill="#FFE08A" opacity="0.7"/>
  <circle cx="560" cy="80" r="2" fill="#FFE08A" opacity="0.5"/>
  <circle cx="80" cy="350" r="2" fill="#FFE08A" opacity="0.4"/>
  <circle cx="530" cy="320" r="3" fill="#FFE08A" opacity="0.6"/>
  <!-- Giant question mark -->
  <text x="300" y="270" font-family="Arial Black, sans-serif" font-size="220" font-weight="900" fill="#FFE08A" text-anchor="middle" opacity="0.15">?</text>
  <text x="300" y="260" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" fill="#BA7517" text-anchor="middle" opacity="0.5">?</text>
  <text x="300" y="250" font-family="Arial Black, sans-serif" font-size="150" font-weight="900" fill="#FFE08A" text-anchor="middle">?</text>
  <!-- Scientist stick figures -->
  <!-- Left scientist -->
  <circle cx="110" cy="260" r="22" fill="none" stroke="#FFE08A" stroke-width="4" opacity="0.7"/>
  <line x1="110" y1="282" x2="110" y2="340" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="110" y1="300" x2="82" y2="320" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="110" y1="300" x2="138" y2="320" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Scratch head line -->
  <path d="M128 248 Q145 235 132 255" stroke="#FFE08A" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Right scientist -->
  <circle cx="490" cy="260" r="22" fill="none" stroke="#FFE08A" stroke-width="4" opacity="0.7"/>
  <line x1="490" y1="282" x2="490" y2="340" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="490" y1="300" x2="462" y2="320" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="490" y1="300" x2="518" y2="320" stroke="#FFE08A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M472 248 Q455 235 468 255" stroke="#FFE08A" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Caption -->
  <text x="300" y="388" font-family="Arial, sans-serif" font-size="18" fill="#BA7517" text-anchor="middle">Still being debated today...</text>
</svg>
